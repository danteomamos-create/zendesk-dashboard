name: Zendesk Webhook

on:
  repository_dispatch:
    types: [zendesk_ticket_event]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Save Zendesk payload
        run: |
          mkdir -p data/events
          echo '${{ toJson(github.event.client_payload) }}' > data/events/ticket-${{ github.run_id }}.json

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Zendesk webhook update" || echo "No changes"
          git push
